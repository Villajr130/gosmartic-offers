name: Notify New Blog Post
on:
  push:
    paths:
      - 'data/blog-posts.json'
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Detect new post
        id: detect
        run: |
          git show HEAD~1:data/blog-posts.json > old.json 2>/dev/null || echo '{"posts":[]}' > old.json
          node -e "
            const fs = require('fs');
            let oldData;
            try {
              oldData = JSON.parse(fs.readFileSync('old.json'));
            } catch (e) {
              console.log('Version anterior no es JSON valido, tratando como vacia.');
              oldData = { posts: [] };
            }
            const newData = JSON.parse(fs.readFileSync('data/blog-posts.json'));
            const oldSlugs = new Set(oldData.posts.map(p => p.slug));
            const nuevos = newData.posts.filter(p => !oldSlugs.has(p.slug));
            fs.writeFileSync('has_new.txt', nuevos.length > 0 ? 'true' : 'false');
            if (nuevos.length > 0) fs.writeFileSync('new-post.json', JSON.stringify(nuevos[0]));
          "
          echo "has_new=$(cat has_new.txt)" >> $GITHUB_OUTPUT
      - name: Send OneSignal push
        if: steps.detect.outputs.has_new == 'true'
        run: |
          TITLE=$(node -pe "JSON.parse(require('fs').readFileSync('new-post.json')).titulo")
          SLUG=$(node -pe "JSON.parse(require('fs').readFileSync('new-post.json')).slug")
          curl -s -X POST https://api.onesignal.com/notifications \
            -H "Authorization: Key ${{ secrets.ONESIGNAL_REST_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"app_id\":\"${{ secrets.ONESIGNAL_APP_ID }}\",\"included_segments\":[\"Subscribed Users\"],\"headings\":{\"it\":\"Nuovo articolo su GoSmArtic\"},\"contents\":{\"it\":\"$TITLE\"},\"url\":\"https://gosmartic.com/#blog/$SLUG\"}"
      - name: Send Buttondown email
        if: steps.detect.outputs.has_new == 'true'
        run: |
          TITLE=$(node -pe "JSON.parse(require('fs').readFileSync('new-post.json')).titulo")
          RESUMEN=$(node -pe "JSON.parse(require('fs').readFileSync('new-post.json')).resumen")
          SLUG=$(node -pe "JSON.parse(require('fs').readFileSync('new-post.json')).slug")
          curl -s -X POST https://api.buttondown.email/v1/emails \
            -H "Authorization: Token ${{ secrets.BUTTONDOWN_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "X-Buttondown-Live-Dangerously: true" \
            -d "{\"subject\":\"Nuovo articolo: $TITLE\",\"body\":\"$RESUMEN\n\nLeggi tutto: https://gosmartic.com/#blog/$SLUG\",\"status\":\"about_to_send\"}"
