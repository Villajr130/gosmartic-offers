name: Check Amazon Offers
on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  check-offers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run offer check
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: node scripts/check-offers.js
      - name: Commit updated offers.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/offers.json data/last-checked.json
          git diff --staged --quiet || git commit -m "chore: update offers data [skip ci]"
          git push
      - name: Purge jsDelivr cache
        run: |
          curl -s "https://purge.jsdelivr.net/gh/Villajr130/gosmartic-offers@main/data/offers.json"
