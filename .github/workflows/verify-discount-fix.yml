name: Verify Discount Fix (temporal)
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  verify-discount-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Correr extractDiscountPct() real contra JSON crudo de SerpApi
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: node scripts/verify-discount-fix.js
